<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>docket — Feature Tracker</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #2E2E28; --card-bg: #3C3C34; --elevated: #4A4A40; --border: #4A4A40;
    --text: #EDEADF; --muted: #8A8878; --secondary: #D4D1C0;
    --primary: #FF6B6B; --teal: #4ECDC4; --yellow: #FFD166;
    --blocked: #C73A3A; --done: #95E06C;
    --overlay-bg: #1A1A1680;
    --input-bg: #3C3C34;
    --focus: #FF6B6B;
  }
  html.light {
    --bg: #F3EDE0; --card-bg: #FFF0E0; --elevated: #FFFCF5; --border: #2A2A24;
    --text: #2A2A24; --muted: #6B6B60; --secondary: #4A4A40;
    --primary: #FF6B6B; --teal: #3AB5AC; --yellow: #FFD166;
    --blocked: #B83030; --done: #6EBA45;
    --overlay-bg: #2A2A2466;
    --input-bg: #FFF5E8;
    --focus: #E04545;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* Header */
  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
  }
  header h1 { font-size: 20px; color: var(--primary); font-weight: 700; letter-spacing: 1px; }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .theme-toggle {
    background: var(--card-bg); border: 1px solid var(--border); color: var(--muted);
    width: 32px; height: 32px; border-radius: 6px; cursor: pointer; font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    transition: border-color 0.15s;
  }
  .theme-toggle:hover { border-color: var(--primary); }
  .theme-toggle:focus-visible { outline: 2px solid var(--focus); outline-offset: 2px; }
  .unlinked-badge {
    background: var(--blocked); color: #fff; padding: 4px 12px; border-radius: 12px;
    font-size: 13px; cursor: pointer; display: none;
  }
  .unlinked-badge.visible { display: inline-block; }

  /* Board */
  .board {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 14px;
    padding: 20px 24px;
    min-height: calc(100vh - 60px);
    align-content: start;
  }

  /* Columns */
  .column {
    background: var(--card-bg);
    border-radius: 8px;
    padding: 12px;
  }
  .column-header {
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .column-header .dot {
    width: 8px; height: 8px; border-radius: 50%; display: inline-block;
  }
  .column-header .count { color: var(--muted); font-weight: 400; }
  .col-planned .column-header { color: var(--muted); }
  .col-planned .dot { background: var(--muted); }
  .col-in-progress .column-header { color: var(--primary); }
  .col-in-progress .dot { background: var(--primary); }
  .col-blocked .column-header { color: var(--blocked); }
  .col-blocked .dot { background: var(--blocked); }
  .col-dev-complete .column-header { color: var(--yellow); }
  .col-dev-complete .dot { background: var(--yellow); }
  .col-done .column-header { color: var(--done); }
  .col-done .dot { background: var(--done); }

  /* Cards */
  .card {
    background: var(--elevated);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 14px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .card:hover {
    border-color: var(--primary);
    box-shadow: 0 0 12px #FF6B6B20;
  }
  .card:focus-visible {
    outline: 2px solid var(--focus);
    outline-offset: 2px;
  }
  .card-title {
    font-size: 15px;
    color: var(--text);
    font-weight: 600;
    margin-bottom: 4px;
  }
  .card-id {
    font-size: 11px;
    color: var(--muted);
    font-family: monospace;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .copy-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 12px;
    padding: 0 2px;
    opacity: 0;
    transition: opacity 0.15s, color 0.15s;
  }
  .card:hover .copy-btn, .copy-btn:focus-visible { opacity: 1; }
  .copy-btn:hover { color: var(--primary); }
  .copy-btn:focus-visible { outline: 2px solid var(--focus); outline-offset: 2px; }

  /* Per-task progress rows */
  .task-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
  }
  .task-name {
    flex: 1;
    font-size: 13px;
    color: var(--secondary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .task-count {
    font-size: 12px;
    color: var(--muted);
    white-space: nowrap;
    min-width: 28px;
    text-align: right;
  }
  .progress-bar {
    width: 56px;
    height: 5px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
    flex-shrink: 0;
  }
  .progress-fill {
    height: 100%;
    background: var(--primary);
    border-radius: 3px;
    transition: width 0.3s;
  }
  .col-done .progress-fill { background: var(--done); }
  .col-dev-complete .progress-fill { background: var(--yellow); }

  /* Left-off snippet on card */
  .card-leftoff {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.4;
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid var(--border);
  }

  .issue-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: #C73A3A20;
    color: var(--blocked);
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 4px;
    margin-top: 6px;
  }
  html.light .issue-badge { background: #FFD0D0; color: #8A2020; }

  .spec-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: #4ECDC420;
    color: var(--teal);
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 4px;
    cursor: pointer;
    border: none;
    transition: background 0.15s;
  }
  .spec-badge:hover { background: #4ECDC440; }
  html.light .spec-badge { background: #E0F5F3; color: #1A7A72; }
  html.light .spec-badge:hover { background: #C0EBE8; }

  /* Spec modal */
  .spec-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: var(--overlay-bg);
    z-index: 100;
    justify-content: center;
    align-items: flex-start;
    padding-top: 5vh;
  }
  .spec-overlay.open { display: flex; }
  .spec-modal {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    width: 90%;
    max-width: 720px;
    max-height: 80vh;
    display: flex;
    flex-direction: column;
  }
  .spec-modal-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .spec-modal-title {
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
    flex: 1;
  }
  .spec-modal-path {
    font-size: 11px;
    color: var(--muted);
    font-family: monospace;
    background: var(--bg);
    padding: 2px 8px;
    border-radius: 4px;
  }
  .spec-modal-close {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    width: 28px;
    height: 28px;
    border-radius: 6px;
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .spec-modal-close:hover { border-color: var(--primary); color: var(--primary); }
  .spec-modal-body {
    padding: 20px;
    overflow-y: auto;
    font-size: 14px;
    color: var(--text);
    line-height: 1.6;
  }
  /* Markdown rendering styles */
  .spec-modal-body h1, .spec-modal-body h2, .spec-modal-body h3 { color: var(--primary); margin: 16px 0 8px; }
  .spec-modal-body h1 { font-size: 20px; }
  .spec-modal-body h2 { font-size: 18px; }
  .spec-modal-body h3 { font-size: 16px; }
  .spec-modal-body p { margin-bottom: 12px; color: var(--secondary); }
  .spec-modal-body ul, .spec-modal-body ol { margin-left: 20px; margin-bottom: 12px; color: var(--secondary); }
  .spec-modal-body li { margin-bottom: 4px; }
  .spec-modal-body code { font-size: 13px; background: var(--bg); padding: 1px 6px; border-radius: 3px; }
  .spec-modal-body pre { background: var(--bg); padding: 12px; border-radius: 6px; overflow-x: auto; margin-bottom: 12px; }
  .spec-modal-body pre code { padding: 0; background: none; }
  .spec-modal-body a { color: var(--teal); }
  .spec-modal-body blockquote { border-left: 3px solid var(--border); padding-left: 12px; color: var(--muted); margin-bottom: 12px; }

  /* Session status */
  .session-status {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    margin-left: auto;
  }
  .status-working {
    color: var(--done);
  }
  .status-working .pulse {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--done);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
  .status-subagent {
    color: var(--teal);
  }
  .status-subagent .pulse {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--teal);
    animation: pulse 2s ease-in-out infinite;
  }
  .status-attention {
    color: var(--yellow);
    font-weight: 600;
  }
  .status-attention .pulse {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--yellow);
    animation: pulse 1s ease-in-out infinite;
  }
  .status-launching {
    color: var(--muted);
  }
  .status-launching .pulse {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--muted);
    animation: pulse 1s ease-in-out infinite;
  }
  .status-stale {
    color: var(--muted);
  }
  .status-stale .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--muted);
  }
  .launch-btn {
    background: none; border: 1px solid var(--border); color: var(--muted);
    width: 24px; height: 24px; border-radius: 4px; cursor: pointer;
    font-size: 12px; display: flex; align-items: center; justify-content: center;
    transition: border-color 0.15s, color 0.15s;
    flex-shrink: 0;
  }
  .launch-btn:hover { border-color: var(--teal); color: var(--teal); }
  .launch-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .launch-btn:disabled:hover { border-color: var(--border); color: var(--muted); }
  .session-status.status-stale { opacity: 0.5; }
  .toast {
    position: fixed; bottom: 20px; right: 20px;
    background: var(--elevated); color: var(--text); border: 1px solid var(--border);
    padding: 10px 16px; border-radius: 6px; font-size: 13px;
    opacity: 0; transition: opacity 0.3s;
    z-index: 1000;
  }
  .toast.visible { opacity: 1; }

  .card-header-row {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 4px;
  }
  .card-header-row .card-title {
    flex: 1;
    margin-bottom: 0;
  }

  .tag-pill {
    display: inline-block;
    padding: 1px 8px;
    border-radius: 10px;
    font-size: 11px;
    border: 1px solid #4ECDC440;
    color: var(--teal);
    margin: 2px 2px 2px 0;
  }
  html.light .tag-pill { border-color: #1A7A7240; color: #1A7A72; }

  /* Tag Editor */
  .tag-editor { margin-top: 4px; }
  .tag-editor-pills { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 6px; }
  .tag-editor-pill {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 2px 8px; border-radius: 10px; font-size: 11px;
    border: 1px solid #4ECDC440; color: var(--teal);
  }
  html.light .tag-editor-pill { border-color: #1A7A7240; color: #1A7A72; }
  .tag-editor-pill .tag-remove {
    cursor: pointer; font-size: 13px; line-height: 1; opacity: 0.6;
    background: none; border: none; color: inherit; padding: 0;
  }
  .tag-editor-pill .tag-remove:hover { opacity: 1; }
  .tag-input-wrap { position: relative; }
  .tag-input {
    background: var(--input-bg); border: 1px solid var(--border); color: var(--text);
    border-radius: 6px; padding: 4px 8px; font-size: 12px; width: 100%;
  }
  .tag-input:focus { outline: none; border-color: var(--focus); }
  .tag-suggestions {
    position: absolute; top: 100%; left: 0; right: 0; z-index: 10;
    background: var(--elevated); border: 1px solid var(--border); border-radius: 6px;
    max-height: 150px; overflow-y: auto; display: none;
  }
  .tag-suggestions.open { display: block; }
  .tag-suggestion {
    padding: 4px 10px; font-size: 12px; cursor: pointer; color: var(--text);
  }
  .tag-suggestion:hover, .tag-suggestion.active { background: var(--card-bg); color: var(--teal); }

  /* Done cards dimmed */
  .col-done .card { opacity: 0.65; }
  .col-done .card:hover { opacity: 1; }

  .col-archived .column-header { color: var(--muted); }
  .col-archived .dot { background: var(--muted); }
  .col-archived .card { opacity: 0.45; }
  .col-archived .card:hover { opacity: 0.8; }

  /* Empty column hint */
  .empty-hint {
    font-size: 12px;
    color: var(--muted);
    font-style: italic;
    padding: 8px 0;
  }

  /* Slide-out panel */
  .panel-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: var(--overlay-bg);
    z-index: 100;
  }
  .panel-overlay.visible { display: flex; justify-content: flex-end; }
  .panel {
    width: 60%;
    min-width: 480px;
    max-width: 800px;
    height: 100vh;
    background: var(--card-bg);
    border-left: 2px solid var(--primary);
    overflow-y: auto;
    padding: 28px;
    animation: slideIn 0.2s ease-out;
  }
  @keyframes slideIn {
    from { transform: translateX(100%); }
    to { transform: translateX(0); }
  }

  /* Panel content */
  .panel-title { font-size: 22px; color: var(--text); font-weight: 700; }
  .panel-slug {
    font-size: 13px;
    color: var(--muted);
    margin-top: 4px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .status-badge {
    padding: 2px 10px;
    border-radius: 4px;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .badge-planned { background: #8A887820; color: var(--muted); }
  .badge-in_progress, .badge-in-progress { background: #FF6B6B20; color: var(--primary); }
  .badge-blocked { background: #C73A3A20; color: var(--blocked); }
  .badge-dev_complete, .badge-dev-complete { background: #FFD16620; color: var(--yellow); }
  .badge-done { background: #95E06C20; color: var(--done); }
  .badge-archived { background: #8A887810; color: var(--muted); }
  html.light .badge-archived { background: #EAEAEA; color: var(--muted); }

  .type-badge {
    padding: 2px 8px;
    border-radius: 12px;
    font-size: 11px;
    border: 1px solid var(--muted);
    color: var(--muted);
    margin-left: 6px;
    text-transform: lowercase;
    letter-spacing: 0.3px;
  }

  .panel-description {
    font-size: 14px;
    color: var(--secondary);
    margin-top: 12px;
    line-height: 1.5;
  }

  /* Section labels */
  .panel-section-label {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-top: 24px;
    margin-bottom: 8px;
  }

  /* Left Off callout */
  .leftoff-callout {
    background: var(--input-bg);
    border-left: 3px solid var(--teal);
    border-radius: 4px;
    padding: 12px 14px;
    font-size: 14px;
    color: var(--text);
    line-height: 1.5;
  }
  .leftoff-callout:empty { display: none; }

  /* Feature notes (user context) callout */
  .feature-notes-callout {
    background: var(--input-bg);
    border-left: 3px solid var(--muted);
    border-radius: 4px;
    padding: 12px 14px;
    font-size: 14px;
    color: var(--text);
    line-height: 1.5;
    white-space: pre-wrap;
  }

  /* Notes textarea */
  .notes-textarea {
    width: 100%;
    background: var(--input-bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 12px;
    border-radius: 4px;
    font-size: 14px;
    font-family: inherit;
    resize: vertical;
    min-height: 70px;
    line-height: 1.5;
  }
  .notes-textarea:focus { outline: none; border-color: var(--focus); }
  .notes-textarea:focus-visible { outline: none; border-color: var(--focus); }
  .notes-textarea::placeholder { color: var(--muted); }
  .save-btn {
    background: var(--primary);
    color: #1A1A16;
    border: none;
    padding: 8px 20px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    margin-top: 8px;
    transition: background 0.15s;
  }
  .save-btn:hover { background: #E04545; }
  .save-btn:active { background: #CC3A3A; }
  .save-btn:focus-visible { outline: 2px solid var(--focus); outline-offset: 2px; }

  /* Tasks in panel */
  .subtask-group {
    margin-top: 8px;
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }
  .subtask-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 14px;
    cursor: pointer;
    background: var(--elevated);
    transition: background 0.1s;
  }
  .subtask-header:hover { background: var(--border); }
  .subtask-header:focus-visible { outline: 2px solid var(--focus); outline-offset: -2px; }
  .subtask-title { font-size: 14px; color: var(--text); font-weight: 500; }
  .subtask-progress { font-size: 13px; color: var(--muted); }
  .subtask-items { padding: 8px 14px 12px; background: var(--input-bg); }
  .subtask-archived { opacity: 0.5; }
  .task-item {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    padding: 5px 0;
    font-size: 14px;
  }
  .task-item.checked { color: var(--muted); }
  .task-item.unchecked { color: var(--text); }
  .task-checkbox { flex-shrink: 0; font-size: 15px; }
  .task-outcome { font-size: 12px; color: var(--muted); margin-left: 24px; margin-top: 2px; }
  .task-commit { font-size: 12px; color: var(--teal); font-family: monospace; margin-left: 24px; }

  /* Key Files */
  .file-tag {
    display: inline-block;
    background: var(--elevated);
    padding: 3px 10px;
    border-radius: 3px;
    font-size: 12px;
    color: var(--teal);
    margin: 3px 3px 3px 0;
    font-family: monospace;
  }

  /* Activity section */
  .activity-toggle {
    display: flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-top: 24px;
    margin-bottom: 8px;
  }
  .activity-toggle:hover { color: var(--secondary); }
  .activity-toggle:focus-visible { outline: 2px solid var(--focus); outline-offset: 2px; }
  .session-item {
    border-top: 1px solid var(--border);
    padding: 10px 0;
  }
  .session-date { font-size: 12px; color: var(--muted); }
  .session-summary { font-size: 13px; color: var(--secondary); margin-top: 3px; line-height: 1.4; }
  .session-files { margin-top: 4px; }

  /* Light mode — accessible text on warm backgrounds */
  html.light .column-header { color: var(--text); }
  html.light .col-planned .column-header { color: var(--muted); }
  html.light header h1 { color: #E04545; }
  html.light .card:hover { border-color: #B33030; box-shadow: 0 0 12px #B3303020; }
  html.light .file-tag { color: #1A7A72; }
  html.light .task-commit { color: #1A7A72; }
  html.light .badge-in_progress, html.light .badge-in-progress { background: #FFD5D5; color: #A02828; }
  html.light .badge-blocked { background: #FFD0D0; color: #8A2020; }
  html.light .badge-dev_complete, html.light .badge-dev-complete { background: #FFF0C0; color: #6A5010; }
  html.light .badge-done { background: #D5F0D0; color: #2A6A22; }

  /* Decisions */
  .decision-item {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    padding: 8px 0;
    border-top: 1px solid var(--border);
    font-size: 13px;
  }
  .decision-item:first-child { border-top: none; }
  .decision-outcome {
    flex-shrink: 0;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    padding: 2px 6px;
    border-radius: 3px;
    margin-top: 1px;
  }
  .decision-accepted { background: #95E06C20; color: var(--done); }
  .decision-rejected { background: #C73A3A20; color: var(--blocked); }
  html.light .decision-accepted { background: #D5F0D0; color: #2A6A22; }
  html.light .decision-rejected { background: #FFD0D0; color: #8A2020; }
  .decision-text { flex: 1; }
  .decision-approach { color: var(--text); }
  .decision-reason { color: var(--muted); font-size: 12px; margin-top: 2px; }

  /* Notes */
  .note-item {
    padding: 8px 0;
    border-top: 1px solid var(--border);
    font-size: 13px;
  }
  .note-item:first-child { border-top: none; }
  .note-item-header { display: flex; justify-content: space-between; align-items: flex-start; }
  .note-content { color: var(--text); white-space: pre-wrap; flex: 1; }
  .note-time { color: var(--muted); font-size: 11px; margin-top: 4px; }
  .note-delete-btn {
    background: none; border: 1px solid var(--border); color: var(--muted);
    border-radius: 4px; cursor: pointer; padding: 2px 8px; font-size: 12px;
    flex-shrink: 0; margin-left: 8px;
  }
  .note-delete-btn:hover { border-color: var(--blocked); color: var(--blocked); }
  .feature-delete-btn {
    background: none; border: 1px solid var(--border); color: var(--text-dim);
    border-radius: 6px; padding: 4px 8px; cursor: pointer; font-size: 13px;
    transition: all 0.15s;
  }
  .feature-delete-btn:hover { border-color: var(--blocked); color: var(--blocked); }

  .issue-item {
    display: flex;
    gap: 10px;
    align-items: flex-start;
    padding: 8px 0;
    border-top: 1px solid var(--border);
  }
  .issue-item:first-child { border-top: none; }
  .issue-status {
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 4px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .issue-open { background: #C73A3A20; color: var(--blocked); }
  .issue-resolved { background: #95E06C20; color: var(--done); }
  html.light .issue-open { background: #FFD0D0; color: #8A2020; }
  html.light .issue-resolved { background: #D5F0D0; color: #2A6A22; }
  .issue-text { flex: 1; }
  .issue-description { color: var(--text); }
  .issue-meta { color: var(--muted); font-size: 12px; margin-top: 2px; }
  .issue-resolve-btn {
    background: none; border: 1px solid var(--border); color: var(--muted);
    border-radius: 4px; cursor: pointer; padding: 2px 8px; font-size: 14px;
    flex-shrink: 0; transition: all 0.15s;
  }
  .issue-resolve-btn:hover { border-color: var(--done); color: var(--done); }
  .add-issue-btn {
    background: var(--card-bg); border: 1px dashed var(--border); color: var(--muted);
    width: 100%; padding: 8px; border-radius: 6px; cursor: pointer;
    font-size: 13px; margin-top: 8px; transition: all 0.15s;
  }
  .add-issue-btn:hover { border-color: var(--primary); color: var(--primary); }
  .issue-form { margin-top: 8px; }
  .issue-input {
    width: 100%; background: var(--input-bg); border: 1px solid var(--border);
    color: var(--text); border-radius: 6px; padding: 8px; font-size: 13px;
    font-family: inherit; resize: vertical;
  }
  .issue-input:focus { outline: none; border-color: var(--focus); }
  .issue-select {
    width: 100%; background: var(--input-bg); border: 1px solid var(--border);
    color: var(--text); border-radius: 6px; padding: 6px 8px; font-size: 13px;
    font-family: inherit; margin-top: 6px;
  }
  .issue-select:focus { outline: none; border-color: var(--focus); }
  .issue-submit-btn {
    background: var(--primary); border: none; color: #fff; padding: 6px 16px;
    border-radius: 4px; cursor: pointer; font-size: 13px;
  }
  .issue-submit-btn:hover { opacity: 0.9; }
  .issue-cancel-btn {
    background: none; border: 1px solid var(--border); color: var(--muted);
    padding: 6px 16px; border-radius: 4px; cursor: pointer; font-size: 13px;
  }
  .issue-cancel-btn:hover { border-color: var(--text); color: var(--text); }
</style>
</head>
<body>
<header>
  <div style="display:flex;align-items:center;gap:10px"><img src="docket-logo.png" alt="docket" height="32" style="width:auto"><h1>docket <span id="projectName" style="color:var(--muted);font-weight:400;font-size:16px;"></span></h1></div>
  <div class="header-right">
    <button class="theme-toggle" id="archiveToggle" onclick="toggleArchived()" title="Show archived features" style="font-size:13px">&#x1F4E6;</button>
    <span class="unlinked-badge" id="unlinkedBadge" onclick="showUnlinked()">0 unlinked sessions</span>
    <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="Toggle dark/light mode"></button>
  </div>
</header>
<div id="toast" class="toast"></div>
<div class="board" id="board"></div>
<div class="panel-overlay" id="panelOverlay" onclick="if(event.target===this)closePanel()">
  <div class="panel" id="panel"></div>
</div>
<script>
function initTheme() {
  var saved = localStorage.getItem('docket-theme');
  var isLight = saved === 'light';
  if (isLight) document.documentElement.classList.add('light');
  document.getElementById('themeToggle').textContent = isLight ? '\u2600' : '\u263E';
}
function toggleTheme() {
  var isLight = document.documentElement.classList.toggle('light');
  localStorage.setItem('docket-theme', isLight ? 'light' : 'dark');
  document.getElementById('themeToggle').textContent = isLight ? '\u2600' : '\u263E';
}
function toggleArchived() {
  showArchived = !showArchived;
  document.getElementById('archiveToggle').style.borderColor = showArchived ? 'var(--primary)' : '';
  load();
}
initTheme();

var API = '';
var STATUSES = ['planned', 'in_progress', 'blocked', 'dev_complete', 'done'];
var ALL_STATUSES = ['planned', 'in_progress', 'blocked', 'dev_complete', 'done', 'archived'];
var STATUS_LABELS = { planned: 'Planned', in_progress: 'In Progress', blocked: 'Blocked', dev_complete: 'Dev Complete', done: 'Done', archived: 'Archived' };
var STATUS_CSS = { planned: 'col-planned', in_progress: 'col-in-progress', blocked: 'col-blocked', dev_complete: 'col-dev-complete', done: 'col-done', archived: 'col-archived' };
var features = [];
var currentPanelId = null;
var showArchived = false;

async function load() {
  try {
    var res = await fetch(API + '/api/features');
    features = await res.json();
    if (showArchived) {
      var res2 = await fetch(API + '/api/features?status=archived');
      var archived = await res2.json();
      features = features.concat(archived);
    }
  } catch(e) { features = []; }
  render();
  loadUnlinked();
}

function showToast(msg) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('visible');
  setTimeout(function() { el.classList.remove('visible'); }, 3000);
}

function showToastWithAction(msg, btnText, onClick) {
  var el = document.getElementById('toast');
  el.innerHTML = '';
  var span = document.createElement('span');
  span.textContent = msg + ' ';
  el.appendChild(span);
  var btn = document.createElement('button');
  btn.textContent = btnText;
  btn.style.cssText = 'margin-left:8px;padding:2px 8px;border:1px solid var(--teal);color:var(--teal);background:transparent;border-radius:4px;cursor:pointer;font-size:12px;';
  btn.onclick = function(e) { e.stopPropagation(); el.classList.remove('visible'); onClick(); };
  el.appendChild(btn);
  el.classList.add('visible');
  setTimeout(function() { el.classList.remove('visible'); }, 8000);
}

async function launchSession(featureId, e) {
  e.stopPropagation();

  // Immediate client-side feedback — show "Launching" before API returns
  var card = document.querySelector('[data-id="' + featureId + '"]');
  if (card) {
    var oldBadge = card.querySelector('.session-status');
    if (oldBadge) oldBadge.remove();
    var hdr = card.querySelector('.card-header-row');
    if (hdr) {
      var badge = document.createElement('span');
      badge.className = 'session-status status-launching';
      badge.innerHTML = '<span class="pulse"></span> Launching';
      hdr.insertBefore(badge, hdr.querySelector('.launch-btn'));
    }
  }

  try {
    var res = await fetch(API + '/api/launch/' + featureId, { method: 'POST' });
    if (!res.ok) {
      var text = await res.text();
      showToast('Launch failed: ' + text);
      load(); // revert the optimistic badge
      return;
    }
    var data = await res.json();
    switch (data.action) {
      case 'launched':
        showToast('Session launched');
        break;
      case 'focused':
        showToast(data.message || 'Session focused');
        break;
      case 'focus_failed':
        showToastWithAction(data.error || 'Focus failed', 'Close & Relaunch', function() {
          closeAndRelaunch(featureId);
        });
        break;
      case 'toast':
        showToastWithAction(data.message, 'Close & Relaunch', function() {
          closeAndRelaunch(featureId);
        });
        break;
      default:
        showToast('Unknown action: ' + data.action);
    }
  } catch (err) {
    showToast('Launch error: ' + err.message);
  }
}

async function closeAndRelaunch(featureId) {
  try {
    var closeRes = await fetch(API + '/api/sessions/' + featureId, { method: 'DELETE' });
    if (!closeRes.ok) {
      showToast('Close failed — session may already be closed');
    }
    var launchRes = await fetch(API + '/api/launch/' + featureId, { method: 'POST' });
    if (!launchRes.ok) {
      var text = await launchRes.text();
      showToast('Relaunch failed: ' + text);
      return;
    }
    var data = await launchRes.json();
    if (data.action === 'launched') {
      showToast('Session relaunched');
    } else {
      showToast(data.message || 'Relaunch: ' + data.action);
    }
  } catch (err) {
    showToast('Relaunch error: ' + err.message);
  }
}

function render() {
  var board = document.getElementById('board');
  board.innerHTML = '';
  var statuses = showArchived ? ALL_STATUSES : STATUSES;
  board.style.gridTemplateColumns = 'repeat(' + statuses.length + ', 1fr)';
  for (var si = 0; si < statuses.length; si++) {
    var status = statuses[si];
    var col = document.createElement('div');
    col.className = 'column ' + STATUS_CSS[status];
    var items = features.filter(function(f) { return f.status === status; });

    var hdr = document.createElement('div');
    hdr.className = 'column-header';
    hdr.innerHTML = '<span class="dot"></span> ' + esc(STATUS_LABELS[status]) + ' <span class="count">(' + items.length + ')</span>';
    col.appendChild(hdr);

    if (items.length === 0) {
      var hint = document.createElement('div');
      hint.className = 'empty-hint';
      hint.textContent = status === 'blocked' ? 'Nothing blocked' : 'No features';
      col.appendChild(hint);
    }

    for (var i = 0; i < items.length; i++) {
      var f = items[i];
      var card = document.createElement('div');
      card.className = 'card';
      card.tabIndex = 0;
      card.setAttribute('data-id', f.id);
      (function(fid) {
        card.onclick = function() { showDetail(fid); };
        card.onkeydown = function(e) { if (e.key === 'Enter') showDetail(fid); };
      })(f.id);

      var headerRow = document.createElement('div');
      headerRow.className = 'card-header-row';

      var titleDiv = document.createElement('div');
      titleDiv.className = 'card-title';
      titleDiv.textContent = f.title;
      headerRow.appendChild(titleDiv);

      // Session status indicator
      var state = f.session_state || 'idle';
      var lastHeartbeat = f.last_heartbeat ? new Date(f.last_heartbeat) : null;
      var isStale = false;
      var staleMinutes = 0;

      if ((state === 'working' || state === 'needs_attention' || state === 'subagent') && lastHeartbeat) {
        staleMinutes = Math.floor((Date.now() - lastHeartbeat.getTime()) / 60000);
        isStale = staleMinutes >= 15;
      }

      if (isStale) {
        var statusSpan = document.createElement('span');
        statusSpan.className = 'session-status status-stale';
        var staleText = staleMinutes < 60
            ? 'Stale (' + staleMinutes + 'm)'
            : staleMinutes < 1440
                ? 'Stale (' + Math.floor(staleMinutes / 60) + 'h)'
                : 'Stale (' + Math.floor(staleMinutes / 1440) + 'd)';
        statusSpan.innerHTML = '<span class="dot"></span> ' + staleText;
        headerRow.appendChild(statusSpan);
      } else if (state === 'working') {
        var statusSpan = document.createElement('span');
        statusSpan.className = 'session-status status-working';
        statusSpan.innerHTML = '<span class="pulse"></span> Working';
        headerRow.appendChild(statusSpan);
      } else if (state === 'subagent') {
        var statusSpan = document.createElement('span');
        statusSpan.className = 'session-status status-subagent';
        statusSpan.innerHTML = '<span class="pulse"></span> Subagent';
        headerRow.appendChild(statusSpan);
      } else if (state === 'needs_attention') {
        var statusSpan = document.createElement('span');
        statusSpan.className = 'session-status status-attention';
        statusSpan.innerHTML = '<span class="pulse"></span> Waiting';
        headerRow.appendChild(statusSpan);
      } else if (state === 'launching') {
        var statusSpan = document.createElement('span');
        statusSpan.className = 'session-status status-launching';
        statusSpan.innerHTML = '<span class="pulse"></span> Launching';
        headerRow.appendChild(statusSpan);
      }

      // Launch button
      var launchBtn = document.createElement('button');
      launchBtn.className = 'launch-btn';
      if ((state === 'working' || state === 'subagent' || state === 'launching') && !isStale) {
        launchBtn.innerHTML = '&#8599;'; // ↗ focus icon
        launchBtn.title = 'Focus or manage session';
      } else {
        launchBtn.innerHTML = '&#9654;'; // ▶ play icon
        launchBtn.title = 'Launch Claude session';
      }
      (function(fid) {
        launchBtn.onclick = function(e) { launchSession(fid, e); };
      })(f.id);
      headerRow.appendChild(launchBtn);

      // Close button — shown for stale or launching sessions
      if (isStale || state === 'launching') {
        var closeBtn = document.createElement('button');
        closeBtn.className = 'launch-btn';
        closeBtn.innerHTML = '&times;';
        closeBtn.title = 'Force close session';
        closeBtn.style.color = 'var(--blocked)';
        (function(fid) {
          closeBtn.onclick = function(e) {
            e.stopPropagation();
            fetch(API + '/api/sessions/' + fid, { method: 'DELETE' }).then(function() { load(); });
          };
        })(f.id);
        headerRow.appendChild(closeBtn);
      }

      card.appendChild(headerRow);

      var idDiv = document.createElement('div');
      idDiv.className = 'card-id';
      idDiv.textContent = f.id;
      var copyBtn = document.createElement('button');
      copyBtn.className = 'copy-btn';
      copyBtn.textContent = '\u2398';
      copyBtn.title = 'Copy ID';
      (function(fid) {
        copyBtn.onclick = function(e) { e.stopPropagation(); copyId(fid, this); };
      })(f.id);
      idDiv.appendChild(copyBtn);
      card.appendChild(idDiv);

      // Per-task progress rows
      var sp = f.subtask_progress || [];
      for (var j = 0; j < sp.length; j++) {
        var row = document.createElement('div');
        row.className = 'task-row';
        var nameSpan = document.createElement('span');
        nameSpan.className = 'task-name';
        nameSpan.textContent = sp[j].title;
        row.appendChild(nameSpan);
        var countSpan = document.createElement('span');
        countSpan.className = 'task-count';
        countSpan.textContent = sp[j].done + '/' + sp[j].total;
        row.appendChild(countSpan);
        var bar = document.createElement('div');
        bar.className = 'progress-bar';
        var fill = document.createElement('div');
        fill.className = 'progress-fill';
        fill.style.width = sp[j].total > 0 ? Math.round((sp[j].done / sp[j].total) * 100) + '%' : '0%';
        bar.appendChild(fill);
        row.appendChild(bar);
        card.appendChild(row);
      }

      // Left-off snippet
      var leftoff = f.left_off || '';
      if (leftoff.length > 80) leftoff = leftoff.slice(0, 80) + '...';
      if (leftoff) {
        var loDiv = document.createElement('div');
        loDiv.className = 'card-leftoff';
        loDiv.textContent = leftoff;
        card.appendChild(loDiv);
      }

      // Spec badge
      if (f.spec_path) {
        var specBadge = document.createElement('button');
        specBadge.className = 'spec-badge';
        specBadge.textContent = '\uD83D\uDCC4 Spec';
        specBadge.title = f.spec_path;
        (function(path, title) {
          specBadge.onclick = function(e) { e.stopPropagation(); showSpec(path, title); };
        })(f.spec_path, f.title);
        card.appendChild(specBadge);
      }

      // Plan badge
      if (f.plan_path) {
        var planBadge = document.createElement('button');
        planBadge.className = 'spec-badge';
        planBadge.textContent = '\uD83D\uDDD3 Plan';
        planBadge.title = f.plan_path;
        (function(path, title) {
          planBadge.onclick = function(e) { e.stopPropagation(); showSpec(path, title); };
        })(f.plan_path, f.title);
        card.appendChild(planBadge);
      }

      if (f.issue_count > 0) {
        var issueBadge = document.createElement('div');
        issueBadge.className = 'issue-badge';
        issueBadge.textContent = '! ' + f.issue_count + ' issue' + (f.issue_count !== 1 ? 's' : '');
        card.appendChild(issueBadge);
      }

      // Tag pills
      var tags = f.tags || [];
      if (tags.length > 0) {
        var tagWrap = document.createElement('div');
        tagWrap.style.marginTop = '6px';
        for (var ti = 0; ti < tags.length; ti++) {
          var pill = document.createElement('span');
          pill.className = 'tag-pill';
          pill.textContent = tags[ti];
          tagWrap.appendChild(pill);
        }
        card.appendChild(tagWrap);
      }

      col.appendChild(card);
    }
    board.appendChild(col);
  }
}

async function showDetail(id) {
  currentPanelId = id;
  try {
    var res = await fetch(API + '/api/features/' + id + '?include_archived=true');
    var data = await res.json();
  } catch(e) { return; }
  var f = data.feature;
  var subtasks = data.subtasks || [];
  var sessions = data.sessions || [];
  var panel = document.getElementById('panel');
  panel.innerHTML = '';

  // Title
  var title = document.createElement('div');
  title.className = 'panel-title';
  title.textContent = f.title;
  panel.appendChild(title);

  // Slug + copy + badge
  var slugDiv = document.createElement('div');
  slugDiv.className = 'panel-slug';
  slugDiv.textContent = f.id + ' ';
  var panelCopyBtn = document.createElement('button');
  panelCopyBtn.className = 'copy-btn';
  panelCopyBtn.style.opacity = '1';
  panelCopyBtn.textContent = '\u2398';
  panelCopyBtn.title = 'Copy ID';
  (function(fid) {
    panelCopyBtn.onclick = function() { copyId(fid, this); };
  })(f.id);
  slugDiv.appendChild(panelCopyBtn);
  var badge = document.createElement('span');
  badge.className = 'status-badge badge-' + f.status;
  badge.textContent = STATUS_LABELS[f.status] || f.status;
  slugDiv.appendChild(badge);
  if (f.type) {
    var typeBadge = document.createElement('span');
    typeBadge.className = 'type-badge';
    typeBadge.textContent = f.type;
    slugDiv.appendChild(typeBadge);
  }
  panel.appendChild(slugDiv);

  // Delete button
  var deleteBtn = document.createElement('button');
  deleteBtn.className = 'feature-delete-btn';
  deleteBtn.textContent = 'Delete Feature';
  deleteBtn.title = 'Permanently delete this feature and all its data';
  (function(featureId, featureTitle) {
    deleteBtn.onclick = function() { deleteFeature(featureId, featureTitle); };
  })(f.id, f.title);
  panel.appendChild(deleteBtn);

  // Tags editor
  var tagLabel = document.createElement('div');
  tagLabel.className = 'panel-section-label';
  tagLabel.textContent = 'Tags';
  panel.appendChild(tagLabel);
  var tagEditor = document.createElement('div');
  tagEditor.className = 'tag-editor';
  var tagPills = document.createElement('div');
  tagPills.className = 'tag-editor-pills';
  tagPills.id = 'tagEditorPills';
  tagEditor.appendChild(tagPills);
  var currentTags = (f.tags || []).slice();
  renderTagPills(tagPills, currentTags, f.id);
  var tagInputWrap = document.createElement('div');
  tagInputWrap.className = 'tag-input-wrap';
  var tagInput = document.createElement('input');
  tagInput.className = 'tag-input';
  tagInput.id = 'tagInput';
  tagInput.type = 'text';
  tagInput.placeholder = 'Add tag...';
  tagInput.setAttribute('autocomplete', 'off');
  tagInputWrap.appendChild(tagInput);
  var tagSuggestions = document.createElement('div');
  tagSuggestions.className = 'tag-suggestions';
  tagSuggestions.id = 'tagSuggestions';
  tagInputWrap.appendChild(tagSuggestions);
  tagEditor.appendChild(tagInputWrap);
  panel.appendChild(tagEditor);
  initTagInput(tagInput, tagSuggestions, tagPills, currentTags, f.id);

  // Description
  if (f.description) {
    var desc = document.createElement('div');
    desc.className = 'panel-description';
    desc.textContent = f.description;
    panel.appendChild(desc);
  }

  // Left Off
  if (f.left_off) {
    var loLabel = document.createElement('div');
    loLabel.className = 'panel-section-label';
    loLabel.textContent = 'Left Off';
    panel.appendChild(loLabel);
    var loCallout = document.createElement('div');
    loCallout.className = 'leftoff-callout';
    loCallout.textContent = f.left_off;
    panel.appendChild(loCallout);
  }

  // Feature notes (user context set at creation / via update)
  if (f.notes) {
    var fnLabel = document.createElement('div');
    fnLabel.className = 'panel-section-label';
    fnLabel.textContent = 'Context';
    panel.appendChild(fnLabel);
    var fnCallout = document.createElement('div');
    fnCallout.className = 'feature-notes-callout';
    fnCallout.textContent = f.notes;
    panel.appendChild(fnCallout);
  }

  // Notes — append form + entries list
  var notesLabel = document.createElement('div');
  notesLabel.className = 'panel-section-label';
  var notesList = data.notes || [];
  notesLabel.textContent = 'Notes' + (notesList.length > 0 ? ' (' + notesList.length + ')' : '');
  panel.appendChild(notesLabel);
  var ta = document.createElement('textarea');
  ta.className = 'notes-textarea';
  ta.id = 'notesInput';
  ta.placeholder = 'Add a note — findings, context, observations...';
  ta.rows = 2;
  panel.appendChild(ta);
  var saveBtn = document.createElement('button');
  saveBtn.className = 'save-btn';
  saveBtn.textContent = 'Save Note';
  (function(fid) {
    saveBtn.onclick = function() { saveNote(fid); };
  })(f.id);
  panel.appendChild(saveBtn);

  for (var ni = 0; ni < notesList.length; ni++) {
    var note = notesList[ni];
    var noteDiv = document.createElement('div');
    noteDiv.className = 'note-item';

    var headerDiv = document.createElement('div');
    headerDiv.className = 'note-item-header';
    var contentDiv = document.createElement('div');
    contentDiv.className = 'note-content';
    contentDiv.textContent = note.content;
    headerDiv.appendChild(contentDiv);
    var delBtn = document.createElement('button');
    delBtn.className = 'note-delete-btn';
    delBtn.textContent = '✕';
    delBtn.title = 'Delete note';
    (function(noteId, featureId) {
      delBtn.onclick = function() { deleteNote(noteId, featureId); };
    })(note.id, f.id);
    headerDiv.appendChild(delBtn);
    noteDiv.appendChild(headerDiv);

    var timeDiv = document.createElement('div');
    timeDiv.className = 'note-time';
    timeDiv.textContent = new Date(note.created_at).toLocaleString();
    noteDiv.appendChild(timeDiv);

    panel.appendChild(noteDiv);
  }

  // Tasks
  if (subtasks.length > 0) {
    var tasksLabel = document.createElement('div');
    tasksLabel.className = 'panel-section-label';
    tasksLabel.textContent = 'Tasks';
    panel.appendChild(tasksLabel);

    for (var si = 0; si < subtasks.length; si++) {
      var st = subtasks[si];
      var group = document.createElement('div');
      group.className = 'subtask-group' + (st.archived ? ' subtask-archived' : '');

      var header = document.createElement('div');
      header.className = 'subtask-header';
      header.tabIndex = 0;
      var titleSpan = document.createElement('span');
      titleSpan.className = 'subtask-title';
      var stItems = st.items || [];
      var stDone = 0;
      for (var ii = 0; ii < stItems.length; ii++) { if (stItems[ii].checked) stDone++; }
      // Archived collapsed by default, active expanded
      var startCollapsed = st.archived;
      titleSpan.textContent = (startCollapsed ? '\u25B8' : '\u25BE') + ' ' + st.title + (st.archived ? ' (archived)' : '');
      header.appendChild(titleSpan);
      var progSpan = document.createElement('span');
      progSpan.className = 'subtask-progress';
      progSpan.textContent = stDone + '/' + stItems.length + (stDone === stItems.length && stItems.length > 0 ? ' \u2713' : '');
      header.appendChild(progSpan);
      group.appendChild(header);

      var itemsDiv = document.createElement('div');
      itemsDiv.className = 'subtask-items';
      if (startCollapsed) itemsDiv.style.display = 'none';

      (function(itemsDiv, titleSpan, st) {
        header.onclick = function() { toggleSubtask(itemsDiv, titleSpan, st); };
        header.onkeydown = function(e) { if (e.key === 'Enter') toggleSubtask(itemsDiv, titleSpan, st); };
      })(itemsDiv, titleSpan, st);

      for (var ti = 0; ti < stItems.length; ti++) {
        var item = stItems[ti];
        var taskDiv = document.createElement('div');
        taskDiv.className = 'task-item ' + (item.checked ? 'checked' : 'unchecked');
        var cb = document.createElement('span');
        cb.className = 'task-checkbox';
        cb.textContent = item.checked ? '\u2611' : '\u2610';
        taskDiv.appendChild(cb);
        var titleEl = document.createElement('span');
        titleEl.textContent = item.title;
        taskDiv.appendChild(titleEl);
        itemsDiv.appendChild(taskDiv);

        if (item.outcome) {
          var outcomeDiv = document.createElement('div');
          outcomeDiv.className = 'task-outcome';
          outcomeDiv.textContent = item.outcome;
          itemsDiv.appendChild(outcomeDiv);
        }
        if (item.commit_hash) {
          var commitDiv = document.createElement('div');
          commitDiv.className = 'task-commit';
          commitDiv.textContent = item.commit_hash;
          itemsDiv.appendChild(commitDiv);
        }
      }

      group.appendChild(itemsDiv);
      panel.appendChild(group);
    }
  }

  // Key Files
  if (f.key_files && f.key_files.length) {
    var kfLabel = document.createElement('div');
    kfLabel.className = 'panel-section-label';
    kfLabel.textContent = 'Key Files';
    panel.appendChild(kfLabel);
    var kfWrap = document.createElement('div');
    for (var ki = 0; ki < f.key_files.length; ki++) {
      var tag = document.createElement('span');
      tag.className = 'file-tag';
      tag.textContent = f.key_files[ki];
      kfWrap.appendChild(tag);
    }
    panel.appendChild(kfWrap);
  }

  // Decisions
  var decisions = data.decisions || [];
  if (decisions.length > 0) {
    var decLabel = document.createElement('div');
    decLabel.className = 'panel-section-label';
    decLabel.textContent = 'Decisions';
    panel.appendChild(decLabel);

    for (var di = 0; di < decisions.length; di++) {
      var dec = decisions[di];
      var decDiv = document.createElement('div');
      decDiv.className = 'decision-item';

      var outSpan = document.createElement('span');
      outSpan.className = 'decision-outcome decision-' + dec.outcome;
      outSpan.textContent = dec.outcome;
      decDiv.appendChild(outSpan);

      var textDiv = document.createElement('div');
      textDiv.className = 'decision-text';
      var appDiv = document.createElement('div');
      appDiv.className = 'decision-approach';
      appDiv.textContent = dec.approach;
      textDiv.appendChild(appDiv);
      if (dec.reason) {
        var reasonDiv = document.createElement('div');
        reasonDiv.className = 'decision-reason';
        reasonDiv.textContent = dec.reason;
        textDiv.appendChild(reasonDiv);
      }
      decDiv.appendChild(textDiv);
      panel.appendChild(decDiv);
    }
  }

  // Issues
  var issues = data.issues || [];
  var issLabel = document.createElement('div');
  issLabel.className = 'panel-section-label';
  var openCount = issues.filter(function(i) { return i.status === 'open'; }).length;
  issLabel.textContent = 'Issues' + (openCount > 0 ? ' (' + openCount + ' open)' : '');
  panel.appendChild(issLabel);

  for (var ii = 0; ii < issues.length; ii++) {
    var iss = issues[ii];
    var issDiv = document.createElement('div');
    issDiv.className = 'issue-item';

    var statusSpan = document.createElement('span');
    statusSpan.className = 'issue-status issue-' + iss.status;
    statusSpan.textContent = iss.status;
    issDiv.appendChild(statusSpan);

    var textDiv = document.createElement('div');
    textDiv.className = 'issue-text';
    var descDiv = document.createElement('div');
    descDiv.className = 'issue-description';
    descDiv.textContent = iss.description;
    textDiv.appendChild(descDiv);

    var meta = [];
    if (iss.task_item_id) {
      meta.push('Task #' + iss.task_item_id);
    }
    if (iss.resolved_commit) {
      meta.push('Fix: ' + iss.resolved_commit.slice(0, 7));
    }
    if (meta.length > 0) {
      var metaDiv = document.createElement('div');
      metaDiv.className = 'issue-meta';
      metaDiv.textContent = meta.join(' \u00B7 ');
      textDiv.appendChild(metaDiv);
    }
    issDiv.appendChild(textDiv);

    if (iss.status === 'open') {
      var resolveBtn = document.createElement('button');
      resolveBtn.className = 'issue-resolve-btn';
      resolveBtn.textContent = '\u2713';
      resolveBtn.title = 'Resolve issue';
      (function(issueId, featureId) {
        resolveBtn.onclick = function(e) {
          e.stopPropagation();
          resolveIssue(issueId, featureId);
        };
      })(iss.id, f.id);
      issDiv.appendChild(resolveBtn);
    }

    panel.appendChild(issDiv);
  }

  // Add issue form
  var addIssueBtn = document.createElement('button');
  addIssueBtn.className = 'add-issue-btn';
  addIssueBtn.textContent = '+ Add Issue';
  panel.appendChild(addIssueBtn);

  var issueForm = document.createElement('div');
  issueForm.className = 'issue-form';
  issueForm.style.display = 'none';

  var issueDesc = document.createElement('textarea');
  issueDesc.className = 'issue-input';
  issueDesc.placeholder = 'Describe the bug...';
  issueDesc.rows = 3;
  issueForm.appendChild(issueDesc);

  var issueTaskSelect = document.createElement('select');
  issueTaskSelect.className = 'issue-select';
  var defaultOpt = document.createElement('option');
  defaultOpt.value = '';
  defaultOpt.textContent = 'Link to task item (optional)';
  issueTaskSelect.appendChild(defaultOpt);
  for (var si = 0; si < subtasks.length; si++) {
    var st = subtasks[si];
    if (st.archived) continue;
    var items = st.items || [];
    for (var ti = 0; ti < items.length; ti++) {
      var opt = document.createElement('option');
      opt.value = items[ti].id;
      opt.textContent = st.title + ' \u203A ' + items[ti].title;
      issueTaskSelect.appendChild(opt);
    }
  }
  issueForm.appendChild(issueTaskSelect);

  var issueActions = document.createElement('div');
  issueActions.style.cssText = 'display:flex;gap:8px;margin-top:6px';
  var submitBtn = document.createElement('button');
  submitBtn.className = 'issue-submit-btn';
  submitBtn.textContent = 'Submit';
  var cancelBtn = document.createElement('button');
  cancelBtn.className = 'issue-cancel-btn';
  cancelBtn.textContent = 'Cancel';
  issueActions.appendChild(submitBtn);
  issueActions.appendChild(cancelBtn);
  issueForm.appendChild(issueActions);
  panel.appendChild(issueForm);

  addIssueBtn.onclick = function() {
    addIssueBtn.style.display = 'none';
    issueForm.style.display = 'block';
    issueDesc.focus();
  };
  cancelBtn.onclick = function() {
    issueForm.style.display = 'none';
    addIssueBtn.style.display = '';
    issueDesc.value = '';
    issueTaskSelect.value = '';
  };
  (function(featureId) {
    submitBtn.onclick = function() {
      var desc = issueDesc.value.trim();
      if (!desc) return;
      var taskItemId = issueTaskSelect.value ? parseInt(issueTaskSelect.value) : null;
      submitIssue(featureId, desc, taskItemId);
    };
  })(f.id);

  // Activity
  var actToggle = document.createElement('div');
  actToggle.className = 'activity-toggle';
  actToggle.tabIndex = 0;
  var actArrow = document.createElement('span');
  actArrow.textContent = '\u25B8';
  actToggle.appendChild(actArrow);
  actToggle.appendChild(document.createTextNode(' Activity (' + sessions.length + ' session' + (sessions.length !== 1 ? 's' : '') + ')'));
  panel.appendChild(actToggle);

  var actSection = document.createElement('div');
  actSection.style.display = 'none';
  for (var ai = 0; ai < sessions.length; ai++) {
    var sess = sessions[ai];
    var sessDiv = document.createElement('div');
    sessDiv.className = 'session-item';
    var dateDiv = document.createElement('div');
    dateDiv.className = 'session-date';
    dateDiv.textContent = new Date(sess.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    sessDiv.appendChild(dateDiv);
    var sumDiv = document.createElement('div');
    sumDiv.className = 'session-summary';
    sumDiv.textContent = sess.summary;
    sessDiv.appendChild(sumDiv);
    if (sess.files_touched && sess.files_touched.length) {
      var filesDiv = document.createElement('div');
      filesDiv.className = 'session-files';
      for (var fi = 0; fi < sess.files_touched.length; fi++) {
        var fTag = document.createElement('span');
        fTag.className = 'file-tag';
        fTag.textContent = sess.files_touched[fi];
        filesDiv.appendChild(fTag);
      }
      sessDiv.appendChild(filesDiv);
    }
    actSection.appendChild(sessDiv);
  }
  panel.appendChild(actSection);

  actToggle.onclick = function() { toggleActivity(actSection, actArrow); };
  actToggle.onkeydown = function(e) { if (e.key === 'Enter') toggleActivity(actSection, actArrow); };

  document.getElementById('panelOverlay').classList.add('visible');
}

function toggleSubtask(itemsDiv, titleSpan, st) {
  var text = titleSpan.textContent;
  if (itemsDiv.style.display === 'none') {
    itemsDiv.style.display = 'block';
    titleSpan.textContent = text.replace('\u25B8', '\u25BE');
  } else {
    itemsDiv.style.display = 'none';
    titleSpan.textContent = text.replace('\u25BE', '\u25B8');
  }
}

function toggleActivity(section, arrow) {
  if (section.style.display === 'none') {
    section.style.display = 'block';
    arrow.textContent = '\u25BE';
  } else {
    section.style.display = 'none';
    arrow.textContent = '\u25B8';
  }
}

// Tag editor functions
var _knownTags = null;
async function fetchKnownTags() {
  if (_knownTags !== null) return _knownTags;
  try {
    var resp = await fetch(API + '/api/tags');
    _knownTags = await resp.json();
  } catch (e) {
    _knownTags = [];
  }
  return _knownTags;
}

function renderTagPills(container, tags, featureId) {
  container.innerHTML = '';
  for (var i = 0; i < tags.length; i++) {
    var pill = document.createElement('span');
    pill.className = 'tag-editor-pill';
    pill.textContent = tags[i];
    var removeBtn = document.createElement('button');
    removeBtn.className = 'tag-remove';
    removeBtn.textContent = '\u00d7';
    removeBtn.title = 'Remove tag';
    (function(tag) {
      removeBtn.onclick = function() {
        var idx = tags.indexOf(tag);
        if (idx !== -1) tags.splice(idx, 1);
        renderTagPills(container, tags, featureId);
        saveTags(featureId, tags);
      };
    })(tags[i]);
    pill.appendChild(removeBtn);
    container.appendChild(pill);
  }
}

async function saveTags(featureId, tags) {
  await fetch(API + '/api/features/' + featureId, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ tags: tags }),
  });
  _knownTags = null; // bust cache so new tags appear in suggestions
  load();
}

function initTagInput(input, suggestionsEl, pillsContainer, tags, featureId) {
  var activeIdx = -1;

  input.addEventListener('input', async function() {
    var val = input.value.trim().toLowerCase();
    if (!val) { suggestionsEl.classList.remove('open'); return; }
    var known = await fetchKnownTags();
    var filtered = known.filter(function(t) {
      return t.toLowerCase().indexOf(val) !== -1 && tags.indexOf(t) === -1;
    });
    suggestionsEl.innerHTML = '';
    activeIdx = -1;
    if (filtered.length === 0) { suggestionsEl.classList.remove('open'); return; }
    for (var i = 0; i < filtered.length; i++) {
      var opt = document.createElement('div');
      opt.className = 'tag-suggestion';
      opt.textContent = filtered[i];
      opt.setAttribute('data-tag', filtered[i]);
      (function(tag) {
        opt.onclick = function() { addTag(tag); };
      })(filtered[i]);
      suggestionsEl.appendChild(opt);
    }
    suggestionsEl.classList.add('open');
  });

  input.addEventListener('keydown', function(e) {
    var items = suggestionsEl.querySelectorAll('.tag-suggestion');
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      activeIdx = Math.min(activeIdx + 1, items.length - 1);
      updateActive(items);
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      activeIdx = Math.max(activeIdx - 1, 0);
      updateActive(items);
    } else if (e.key === 'Enter') {
      e.preventDefault();
      if (activeIdx >= 0 && items[activeIdx]) {
        addTag(items[activeIdx].getAttribute('data-tag'));
      } else {
        var val = input.value.trim().toLowerCase().replace(/[^a-z0-9_-]/g, '');
        if (val) addTag(val);
      }
    } else if (e.key === 'Escape') {
      suggestionsEl.classList.remove('open');
    }
  });

  input.addEventListener('blur', function() {
    setTimeout(function() { suggestionsEl.classList.remove('open'); }, 150);
  });

  function updateActive(items) {
    for (var i = 0; i < items.length; i++) {
      items[i].classList.toggle('active', i === activeIdx);
    }
  }

  function addTag(tag) {
    if (tags.indexOf(tag) !== -1) return;
    tags.push(tag);
    renderTagPills(pillsContainer, tags, featureId);
    input.value = '';
    suggestionsEl.classList.remove('open');
    saveTags(featureId, tags);
  }
}

async function saveNote(featureId) {
  var input = document.getElementById('notesInput');
  var val = input.value.trim();
  if (!val) return;
  await fetch(API + '/api/notes', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ feature_id: featureId, content: val }),
  });
  input.value = '';
  load();
  if (currentPanelId) showDetail(currentPanelId);
}

async function deleteNote(noteId, featureId) {
  await fetch(API + '/api/notes/' + noteId, { method: 'DELETE' });
  load();
  if (currentPanelId) showDetail(currentPanelId);
}

async function deleteFeature(featureId, featureTitle) {
  if (!confirm('Permanently delete "' + featureTitle + '" and all its subtasks, decisions, notes, and issues?')) return;
  await fetch(API + '/api/features/' + featureId, { method: 'DELETE' });
  closePanel();
  load();
}

async function submitIssue(featureId, description, taskItemId) {
  var body = { feature_id: featureId, description: description };
  if (taskItemId) body.task_item_id = taskItemId;
  await fetch(API + '/api/issues', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  load();
  if (currentPanelId) showDetail(currentPanelId);
}

async function resolveIssue(issueId, featureId) {
  await fetch(API + '/api/issues/' + issueId, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({}),
  });
  load();
  if (currentPanelId) showDetail(currentPanelId);
}

function closePanel() {
  document.getElementById('panelOverlay').classList.remove('visible');
  currentPanelId = null;
}

async function loadUnlinked() {
  try {
    var res = await fetch(API + '/api/sessions?unlinked=true');
    var sessions = await res.json();
    var badge = document.getElementById('unlinkedBadge');
    if (sessions.length > 0) {
      badge.textContent = sessions.length + ' unlinked session' + (sessions.length > 1 ? 's' : '');
      badge.classList.add('visible');
    } else {
      badge.classList.remove('visible');
    }
  } catch(e) {}
}

function showUnlinked() {
  alert('Unlinked sessions panel coming soon. Use the API: GET /api/sessions?unlinked=true');
}

function copyId(id, btn) {
  navigator.clipboard.writeText(id).then(function() {
    var orig = btn.textContent;
    btn.textContent = '\u2713';
    btn.style.opacity = '1';
    setTimeout(function() { btn.textContent = orig; }, 1200);
  });
}

function esc(s) {
  var d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

async function loadProject() {
  try {
    var res = await fetch(API + '/api/project');
    var data = await res.json();
    var name = data.name || 'docket';
    document.title = 'docket — ' + name;
    document.getElementById('projectName').textContent = name;
  } catch(e) {}
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    if (document.getElementById('specOverlay').classList.contains('open')) { closeSpec(); }
    else { closePanel(); }
  }
});

async function showSpec(path, title) {
  var overlay = document.getElementById('specOverlay');
  var specTitle = document.getElementById('specTitle');
  var specPath = document.getElementById('specPath');
  var specBody = document.getElementById('specBody');

  specTitle.textContent = title;
  specPath.textContent = path;
  specBody.innerHTML = '<p style="color:var(--muted)">Loading...</p>';
  overlay.classList.add('open');

  try {
    var resp = await fetch('/api/spec?path=' + encodeURIComponent(path));
    if (!resp.ok) throw new Error('Failed to load spec');
    var md = await resp.text();
    specBody.innerHTML = marked.parse(md);
  } catch (e) {
    specBody.innerHTML = '<p style="color:var(--blocked)">Could not load spec: ' + e.message + '</p>';
  }
}

function closeSpec(e) {
  if (e && e.target !== document.getElementById('specOverlay')) return;
  document.getElementById('specOverlay').classList.remove('open');
}

loadProject();
load();
setInterval(function() {
  load();
  // Don't refresh panel — it wipes unsaved notes textarea
}, 10000);
</script>
<!-- Spec viewer modal -->
<div class="spec-overlay" id="specOverlay" onclick="closeSpec(event)">
  <div class="spec-modal" onclick="event.stopPropagation()">
    <div class="spec-modal-header">
      <span class="spec-modal-title" id="specTitle"></span>
      <span class="spec-modal-path" id="specPath"></span>
      <button class="spec-modal-close" onclick="closeSpec()">&times;</button>
    </div>
    <div class="spec-modal-body" id="specBody"></div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</body>
