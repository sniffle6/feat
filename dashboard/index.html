<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>feat — Feature Tracker</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1b26; color: #a9b1d6; }
  header { display: flex; justify-content: space-between; align-items: center; padding: 16px 24px; border-bottom: 1px solid #292e42; }
  header h1 { font-size: 18px; color: #c0caf5; }
  .unlinked-badge { background: #f7768e; color: #1a1b26; padding: 4px 12px; border-radius: 12px; font-size: 13px; cursor: pointer; display: none; }
  .unlinked-badge.visible { display: inline-block; }
  .board { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; padding: 24px; min-height: calc(100vh - 60px); }
  .column { background: #16161e; border-radius: 8px; padding: 12px; }
  .column-header { font-size: 14px; font-weight: 600; color: #565f89; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid #292e42; }
  .column-header .count { color: #565f89; font-weight: 400; }
  .card { background: #1a1b26; border: 1px solid #292e42; border-radius: 6px; padding: 12px; margin-bottom: 8px; cursor: pointer; transition: border-color 0.15s; }
  .card:hover { border-color: #7aa2f7; }
  .card-title { font-size: 14px; color: #c0caf5; font-weight: 500; margin-bottom: 4px; }
  .card-id { font-size: 12px; color: #565f89; margin-bottom: 6px; }
  .card-leftoff { font-size: 12px; color: #787c99; line-height: 1.4; }
  .status-select { font-size: 11px; padding: 2px 6px; border-radius: 4px; border: 1px solid #292e42; background: #16161e; color: #a9b1d6; margin-top: 8px; cursor: pointer; }
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100; }
  .overlay.visible { display: flex; justify-content: center; align-items: flex-start; padding-top: 60px; }
  .detail { background: #1a1b26; border: 1px solid #292e42; border-radius: 8px; width: 640px; max-height: 80vh; overflow-y: auto; padding: 24px; }
  .detail h2 { color: #c0caf5; font-size: 18px; margin-bottom: 4px; }
  .detail .slug { color: #565f89; font-size: 13px; margin-bottom: 16px; }
  .detail label { display: block; font-size: 12px; color: #565f89; margin-top: 12px; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
  .detail .value { font-size: 14px; color: #a9b1d6; line-height: 1.5; }
  .detail textarea { width: 100%; background: #16161e; border: 1px solid #292e42; color: #a9b1d6; padding: 8px; border-radius: 4px; font-size: 13px; resize: vertical; min-height: 60px; }
  .detail .save-btn { background: #7aa2f7; color: #1a1b26; border: none; padding: 6px 16px; border-radius: 4px; cursor: pointer; font-size: 13px; margin-top: 8px; }
  .session-item { border-top: 1px solid #292e42; padding: 10px 0; }
  .session-date { font-size: 12px; color: #565f89; }
  .session-summary { font-size: 13px; color: #a9b1d6; margin-top: 2px; }
  .session-files { font-size: 11px; color: #787c99; margin-top: 4px; }
  .file-tag { display: inline-block; background: #292e42; padding: 2px 8px; border-radius: 3px; font-size: 11px; color: #7aa2f7; margin: 2px 2px 2px 0; font-family: monospace; }
</style>
</head>
<body>
<header>
  <h1>feat</h1>
  <span class="unlinked-badge" id="unlinkedBadge" onclick="showUnlinked()">0 unlinked sessions</span>
</header>
<div class="board" id="board"></div>
<div class="overlay" id="overlay" onclick="if(event.target===this)closeDetail()">
  <div class="detail" id="detail"></div>
</div>
<script>
const API = '';
const STATUSES = ['planned', 'in_progress', 'blocked', 'done'];
const STATUS_LABELS = { planned: 'Planned', in_progress: 'In Progress', blocked: 'Blocked', done: 'Done' };
let features = [];

async function load() {
  const res = await fetch(API + '/api/features');
  features = await res.json();
  render();
  loadUnlinked();
}

function render() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  for (const status of STATUSES) {
    const col = document.createElement('div');
    col.className = 'column';
    const items = features.filter(f => f.status === status);
    col.innerHTML = '<div class="column-header">' + esc(STATUS_LABELS[status]) + ' <span class="count">(' + items.length + ')</span></div>';
    for (const f of items) {
      const card = document.createElement('div');
      card.className = 'card';
      card.onclick = function() { showDetail(f.id); };
      let leftoff = f.left_off || '';
      if (leftoff.length > 80) leftoff = leftoff.slice(0, 80) + '...';
      const titleDiv = document.createElement('div');
      titleDiv.className = 'card-title';
      titleDiv.textContent = f.title;
      card.appendChild(titleDiv);
      const idDiv = document.createElement('div');
      idDiv.className = 'card-id';
      idDiv.textContent = f.id;
      card.appendChild(idDiv);
      if (leftoff) {
        const loDiv = document.createElement('div');
        loDiv.className = 'card-leftoff';
        loDiv.textContent = leftoff;
        card.appendChild(loDiv);
      }
      const sel = document.createElement('select');
      sel.className = 'status-select';
      sel.onclick = function(e) { e.stopPropagation(); };
      sel.onchange = function() { updateStatus(f.id, this.value); };
      for (const s of STATUSES) {
        const opt = document.createElement('option');
        opt.value = s;
        opt.textContent = STATUS_LABELS[s];
        if (s === f.status) opt.selected = true;
        sel.appendChild(opt);
      }
      card.appendChild(sel);
      col.appendChild(card);
    }
    board.appendChild(col);
  }
}

async function updateStatus(id, status) {
  await fetch(API + '/api/features/' + id, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ status: status }),
  });
  load();
}

async function showDetail(id) {
  const res = await fetch(API + '/api/features/' + id);
  const data = await res.json();
  const f = data.feature;
  const sessions = data.sessions || [];
  const detail = document.getElementById('detail');
  detail.innerHTML = '';

  const h2 = document.createElement('h2');
  h2.textContent = f.title;
  detail.appendChild(h2);

  const slugDiv = document.createElement('div');
  slugDiv.className = 'slug';
  slugDiv.textContent = f.id + ' \u00b7 ' + STATUS_LABELS[f.status];
  detail.appendChild(slugDiv);

  if (f.description) {
    const lbl = document.createElement('label');
    lbl.textContent = 'Description';
    detail.appendChild(lbl);
    const val = document.createElement('div');
    val.className = 'value';
    val.textContent = f.description;
    detail.appendChild(val);
  }

  if (f.worktree_path) {
    const lbl = document.createElement('label');
    lbl.textContent = 'Worktree';
    detail.appendChild(lbl);
    const val = document.createElement('div');
    val.className = 'value';
    const code = document.createElement('code');
    code.textContent = f.worktree_path;
    val.appendChild(code);
    detail.appendChild(val);
  }

  if (f.key_files && f.key_files.length) {
    const lbl = document.createElement('label');
    lbl.textContent = 'Key Files';
    detail.appendChild(lbl);
    const wrap = document.createElement('div');
    for (const p of f.key_files) {
      const tag = document.createElement('span');
      tag.className = 'file-tag';
      tag.textContent = p;
      wrap.appendChild(tag);
    }
    detail.appendChild(wrap);
  }

  const loLabel = document.createElement('label');
  loLabel.textContent = 'Left Off';
  detail.appendChild(loLabel);
  const ta = document.createElement('textarea');
  ta.id = 'leftOffInput';
  ta.value = f.left_off || '';
  detail.appendChild(ta);
  const btn = document.createElement('button');
  btn.className = 'save-btn';
  btn.textContent = 'Save';
  btn.onclick = function() { saveLeftOff(f.id); };
  detail.appendChild(btn);

  const sessLabel = document.createElement('label');
  sessLabel.textContent = 'Sessions (' + sessions.length + ')';
  detail.appendChild(sessLabel);

  if (sessions.length === 0) {
    const noSess = document.createElement('div');
    noSess.className = 'value';
    noSess.textContent = 'No sessions logged yet.';
    detail.appendChild(noSess);
  } else {
    for (const s of sessions) {
      const item = document.createElement('div');
      item.className = 'session-item';
      const dateDiv = document.createElement('div');
      dateDiv.className = 'session-date';
      dateDiv.textContent = new Date(s.created_at).toLocaleDateString();
      item.appendChild(dateDiv);
      const sumDiv = document.createElement('div');
      sumDiv.className = 'session-summary';
      sumDiv.textContent = s.summary;
      item.appendChild(sumDiv);
      if (s.files_touched && s.files_touched.length) {
        const filesDiv = document.createElement('div');
        filesDiv.className = 'session-files';
        for (const ff of s.files_touched) {
          const tag = document.createElement('span');
          tag.className = 'file-tag';
          tag.textContent = ff;
          filesDiv.appendChild(tag);
        }
        item.appendChild(filesDiv);
      }
      detail.appendChild(item);
    }
  }

  document.getElementById('overlay').classList.add('visible');
}

async function saveLeftOff(id) {
  const val = document.getElementById('leftOffInput').value;
  await fetch(API + '/api/features/' + id, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ left_off: val }),
  });
  load();
}

function closeDetail() {
  document.getElementById('overlay').classList.remove('visible');
}

async function loadUnlinked() {
  const res = await fetch(API + '/api/sessions?unlinked=true');
  const sessions = await res.json();
  const badge = document.getElementById('unlinkedBadge');
  if (sessions.length > 0) {
    badge.textContent = sessions.length + ' unlinked session' + (sessions.length > 1 ? 's' : '');
    badge.classList.add('visible');
  } else {
    badge.classList.remove('visible');
  }
}

function showUnlinked() {
  alert('Unlinked sessions panel coming soon. Use the API: GET /api/sessions?unlinked=true');
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeDetail(); });
load();
</script>
</body>
</html>
